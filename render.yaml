services:
  - type: web
    name: recruitee-mcp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /healthz
    envVars:
      - key: RECRUITEE_TOKEN
        sync: false        # à remplir dans le dashboard Render
      - key: RECRUITEE_COMPANY_ID
        sync: false
      - key: MCP_AUTH_TOKEN
        generateValue: true   # Render génère un secret aléatoire
